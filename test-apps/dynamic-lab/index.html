<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dynamic Lab</title>
  </head>
  <body>
    <h1>Prototype-0 Same-Target Demo</h1>
    <p>This page intentionally performs a few risky client-side actions on load.</p>
    <div id="app"></div>

    <script>
      const payload = location.hash || '<strong>demo payload</strong>';
      const app = document.getElementById('app');

      if (app) {
        app.innerHTML = payload;
      }

      localStorage.setItem('token', 'demo-secret');

      const externalScript = document.createElement('script');
      externalScript.src = 'https://cdn.example.com/demo-widget.js';
      document.body.appendChild(externalScript);
    </script>
  </body>
</html>
